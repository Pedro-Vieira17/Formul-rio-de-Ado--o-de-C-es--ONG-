<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção de Cães (ONG)</title>
</head>

<body>
    <h2>Formulário de Adoção</h2>

    <main>

        <form id="FormularioAdocao" method="" action="">

            <label for="nome">Nome: </label>
            <input type="text" id="nome" placeholder="Nome">

            <br><br>

            <label for="email">Email: </label>
            <input type="email" id="email" placeholder="ex@exemplo.com">

            <br><br>

            <label for="cpf">CPF: </label>
            <input type="text" id="cpf" placeholder="99999999999">

            <br><br>

            <label for="telefone">Telefone: </label>
            <input type="text" id="telefone" placeholder="47999999999">

            <br><br>

            <label for="idade">Idade: </label>
            <input type="text" id="idade" placeholder="20">

            <br><br>

            <label for="cidade">Cidade: </label>
            <input type="text" id="cidade" placeholder="Exemplo">

            <br><br>

            <select name="lugar" id="lugar">
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>

            <br><br>

            <label for="quintal">Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim">Sim
            <input type="radio" name="quintal" value="nao">Não

            <br><br>

            <label for="quintal">Já teve Pet?</label>
            <input type="radio" name="pet" value="sim">Sim
            <input type="radio" name="pet" value="nao">Não

            <br>
            <br>

            <label for="horas">Quanto tempo o Pet ficará sozinho?</label>
            <input type="number" id="horas">

            <br>
            <br>

            <label for="motivo">Qual é motivo da adoção?</label>
            <br>
            <textarea name="motivo" id="motivo"></textarea>

            <br>
            <br>

            <label for="permição">O apartamento permite animais?</label>
            <input type="checkbox" id="permição">

            <br>
            <br>

            <label for="seguro">Possui um Quintal apropriado para o Pet?</label>
            <input type="checkbox" id="seguro">

            <br>
            <br>

            <label for="financeiro">Possui uma condição financeira boa?</label>
            <input type="checkbox" id="financeiro">

            <br>
            <br>

            <label for="impulso">Decidiu adotar quando? Hoje?</label>
            <input type="checkbox" id="impulso">

            <br>
            <br>

            <label for="termo">Aceito o termo:</label>
            <input type="checkbox" id="termo">

            <br>
            <br>

            <button type="submit">Enviar AQUI!</button>


        </form>



    </main>

</body>

</html>
